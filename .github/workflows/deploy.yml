name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd backend && npm install
      - run: cd backend && npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: cd backend && docker build -t cicd-backend .
      - run: cd frontend && docker build -t cicd-frontend .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Deployed successfully!"