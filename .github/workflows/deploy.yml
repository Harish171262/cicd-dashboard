name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and test
        run: |
          cd backend
          npm ci
          npx jest --passWithNoTests

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: |
          cd backend && docker build -t cicd-backend .
          cd ../frontend && docker build -t cicd-frontend .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Deployed successfully!"